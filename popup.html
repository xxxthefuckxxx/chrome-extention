<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Xpiper Lead Scraper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #0f1117;
      color: #e2e8f0;
    }

    .header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: 0.5px;
    }
    .header .version {
      font-size: 10px;
      color: #475569;
      margin-left: auto;
    }

    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    textarea, input[type="number"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #e2e8f0;
      padding: 8px 10px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus, input[type="number"]:focus {
      border-color: #38bdf8;
    }
    textarea {
      min-height: 80px;
    }
    input[type="number"] {
      width: 80px;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .field { flex: 1; }
    .field label { margin-bottom: 4px; }

    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary {
      background: #0284c7;
      color: white;
    }
    .btn-primary:hover { background: #0369a1; }
    .btn-primary:disabled { background: #1e3a4f; color: #475569; cursor: not-allowed; }

    .btn-danger {
      background: #7f1d1d;
      color: #fca5a5;
    }
    .btn-danger:hover { background: #991b1b; }

    .btn-success {
      background: #14532d;
      color: #86efac;
    }
    .btn-success:hover { background: #166534; }
    .btn-success:disabled { background: #1e293b; color: #475569; cursor: not-allowed; }

    .btn-warning {
      background: #78350f;
      color: #fcd34d;
    }
    .btn-warning:hover { background: #92400e; }

    .btn-sm {
      width: auto;
      padding: 6px 12px;
      font-size: 11px;
    }

    #status-section {
      padding: 10px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #475569;
      flex-shrink: 0;
    }
    .status-dot.idle    { background: #475569; }
    .status-dot.running { background: #38bdf8; animation: pulse 1s infinite; }
    .status-dot.blocked { background: #f59e0b; animation: pulse 0.5s infinite; }
    .status-dot.done    { background: #22c55e; }
    .status-dot.error   { background: #ef4444; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #status-text {
      font-size: 12px;
      color: #94a3b8;
      flex: 1;
    }

    .progress-bar-wrap {
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress-bar-fill {
      height: 100%;
      background: #38bdf8;
      transition: width 0.3s;
      border-radius: 2px;
    }

    .stats {
      display: flex;
      gap: 12px;
    }
    .stat {
      text-align: center;
      flex: 1;
      background: #1e293b;
      border-radius: 6px;
      padding: 6px 4px;
    }
    .stat-val {
      font-size: 18px;
      font-weight: 700;
      color: #38bdf8;
      line-height: 1;
    }
    .stat-label {
      font-size: 9px;
      color: #64748b;
      text-transform: uppercase;
      margin-top: 2px;
    }

    #captcha-alert {
      display: none;
      margin: 0 16px 10px;
      background: #451a03;
      border: 1px solid #92400e;
      border-radius: 6px;
      padding: 10px 12px;
    }
    #captcha-alert .alert-title {
      font-weight: 700;
      color: #fcd34d;
      margin-bottom: 4px;
      font-size: 12px;
    }
    #captcha-alert .alert-body {
      color: #fde68a;
      font-size: 11px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    #log-section {
      padding: 8px 16px 12px;
    }
    #log-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    #log {
      background: #0a0f1a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      height: 100px;
      overflow-y: auto;
      padding: 6px 8px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #64748b;
      line-height: 1.6;
    }
    #log .log-info  { color: #64748b; }
    #log .log-ok    { color: #22c55e; }
    #log .log-warn  { color: #f59e0b; }
    #log .log-error { color: #ef4444; }

    .btn-row {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>⚡ Xpiper Scraper</h1>
    <span class="version">v1.1</span>
  </div>

  <!-- Config -->
  <div class="section">
    <label>Cities (one per line)</label>
    <textarea id="cities" placeholder="Tampa, FL&#10;Miami, FL&#10;Austin, TX"></textarea>
  </div>

  <div class="section">
    <div class="row">
      <div class="field">
        <label>Max agents per city</label>
        <input type="number" id="maxAgents" value="30" min="1" max="200">
      </div>
      <div class="field">
        <label>Pages per city</label>
        <input type="number" id="maxPages" value="2" min="1" max="10">
      </div>
      <div class="field">
        <label>Delay (sec)</label>
        <input type="number" id="delay" value="4" min="1" max="30">
      </div>
    </div>
  </div>

  <!-- Status -->
  <div id="status-section">
    <div class="status-bar">
      <div class="status-dot idle" id="status-dot"></div>
      <span id="status-text">Ready</span>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-val" id="stat-cities">0</div>
        <div class="stat-label">Cities</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-links">0</div>
        <div class="stat-label">Profiles found</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-scraped">0</div>
        <div class="stat-label">Scraped</div>
      </div>
      <div class="stat">
        <div class="stat-val" id="stat-failed">0</div>
        <div class="stat-label">Failed</div>
      </div>
    </div>
  </div>

  <!-- Captcha alert -->
  <div id="captcha-alert">
    <div class="alert-title">🔒 CAPTCHA / Block Detected</div>
    <div class="alert-body" id="captcha-msg">
      Zillow blocked the request. Please switch to the Zillow tab,
      solve the CAPTCHA, then click Continue below.
    </div>
    <button class="btn btn-warning btn-sm" id="btn-continue">▶ Continue after solving</button>
  </div>

  <!-- Action buttons -->
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-start">▶ Start Scraping</button>
    <button class="btn btn-danger btn-sm" id="btn-stop" disabled>■ Stop</button>
    <button class="btn btn-success btn-sm" id="btn-export" disabled>↓ CSV</button>
  </div>

  <!-- Log -->
  <div id="log-section">
    <label>Log</label>
    <div id="log"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
